<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M'HUNTERS — Games</title>
  <meta name="description" content="M'Hunters clan ladder — live games and the full results archive with filters.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Cinzel:wght@700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/games.css">
</head>
<body>

  <!-- Fixed full-page watermark (archer banner, steel-tinted) -->
  <div class="watermark" aria-hidden="true"></div>

  <!-- ===================== MASTHEAD ===================== -->
  <header class="masthead">
    <div class="masthead__inner">
      <div class="brand">
        <img class="brand__crest" src="assets/clan-crest.png" alt="M'Hunters clan crest" width="44" height="44">
        <div class="brand__text">
          <span class="brand__wordmark">M'HUNTERS <img class="clan-tag" src="assets/clan-tag.png" alt="" width="21" height="15"></span>
          <span class="brand__subtitle">1V1 CLAN LADDER</span>
        </div>
      </div>
      <div class="masthead__right">
        <div class="stats" role="status" aria-label="Ladder status">
          <span class="stat" id="stat-active">— ACTIVE</span>
          <span class="stat stat--games" id="stat-games">— GAMES</span>
          <span class="stat stat--updated" id="stat-updated">Last Update —</span>
        </div>
        <nav class="mainnav" aria-label="Primary">
          <a href="index.html" class="mainnav__link">STANDINGS</a>
          <a href="#" class="mainnav__link active" aria-current="page">GAMES</a>
          <a href="maps.html" class="mainnav__link">MAPS</a>
          <a href="actions.html" class="mainnav__link">ACTIONS</a>
          <a href="rules.html" class="mainnav__link">RULES</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="games-main">

    <h1 class="sr-only">Games</h1>

    <!-- ===================== GAMES (LIVE | RESULTS) ===================== -->
    <section class="games panel">

      <!-- segmented control -->
      <div class="gtabs" role="tablist" aria-label="Games views">
        <button type="button" id="tab-live" class="gtab" role="tab"
                aria-selected="true" aria-controls="live-view">LIVE</button>
        <button type="button" id="tab-results" class="gtab" role="tab"
                aria-selected="false" aria-controls="results-view">RESULTS</button>
      </div>

      <!-- ---------- LIVE ---------- -->
      <div id="live-view" role="tabpanel" aria-labelledby="tab-live" tabindex="0">
        <div id="live-list">
          <!-- pre-data skeleton; js/games.js replaces the list contents -->
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:46%"></span>
            <span class="sk sk--sub" style="width:30%"></span>
          </div>
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:38%"></span>
            <span class="sk sk--sub" style="width:26%"></span>
          </div>
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:52%"></span>
            <span class="sk sk--sub" style="width:33%"></span>
          </div>
        </div>
        <div id="live-empty" class="gempty" hidden>NO LIVE GAMES — NORMAN RUNS EVERY 2 HOURS</div>
      </div>

      <!-- ---------- RESULTS ---------- -->
      <div id="results-view" role="tabpanel" aria-labelledby="tab-results" tabindex="0" hidden>

        <div id="results-toolbar">
          <input type="text" id="filter-player" list="player-options"
                 placeholder="FILTER BY PLAYER"
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                 aria-label="Filter results by player name">
          <datalist id="player-options"></datalist>
          <select id="filter-map" aria-label="Filter results by map">
            <option value="">ALL MAPS</option>
          </select>
          <div class="gf-range">
            <input type="month" id="filter-from" placeholder="YYYY-MM"
                   aria-label="From month" title="From month">
            <span class="gf-dash" aria-hidden="true">–</span>
            <input type="month" id="filter-to" placeholder="YYYY-MM"
                   aria-label="To month" title="To month">
          </div>
          <button type="button" id="filter-clear">CLEAR</button>
          <span id="results-count">—</span>
        </div>

        <div id="results-list">
          <!-- pre-data skeleton; js/games.js replaces the list contents -->
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:54%"></span>
            <span class="sk sk--sub" style="width:34%"></span>
          </div>
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:42%"></span>
            <span class="sk sk--sub" style="width:28%"></span>
          </div>
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:58%"></span>
            <span class="sk sk--sub" style="width:31%"></span>
          </div>
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:47%"></span>
            <span class="sk sk--sub" style="width:36%"></span>
          </div>
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:51%"></span>
            <span class="sk sk--sub" style="width:27%"></span>
          </div>
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:40%"></span>
            <span class="sk sk--sub" style="width:32%"></span>
          </div>
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:56%"></span>
            <span class="sk sk--sub" style="width:29%"></span>
          </div>
          <div class="grow-skel" aria-hidden="true">
            <span class="sk" style="width:44%"></span>
            <span class="sk sk--sub" style="width:35%"></span>
          </div>
        </div>
        <div id="results-empty" class="gempty" hidden>NO GAMES MATCH THESE FILTERS</div>

        <!-- lazy-load sentinel: IntersectionObserver target (js/games.js) -->
        <div id="results-sentinel" aria-hidden="true"></div>

      </div>

    </section>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <p class="colophon">M'HUNTERS · WARZONE CLAN 141</p>
  </footer>

  <!-- ===================== MOBILE TAB BAR ===================== -->
  <nav class="tabbar" aria-label="Primary mobile">
    <a href="index.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">▤</span>
      <span class="tab__label">STANDINGS</span>
    </a>
    <a href="#" class="tab active" aria-current="page">
      <span class="tab__glyph" aria-hidden="true">⚔</span>
      <span class="tab__label">GAMES</span>
    </a>
    <a href="maps.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">◈</span>
      <span class="tab__label">MAPS</span>
    </a>
    <a href="actions.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">⚙</span>
      <span class="tab__label">ACTIONS</span>
    </a>
    <a href="rules.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">§</span>
      <span class="tab__label">RULES</span>
    </a>
  </nav>

  <script src="js/derive.js"></script>
  <script src="js/insignia.js"></script>
  <script src="js/games.js"></script>
</body>
</html>
