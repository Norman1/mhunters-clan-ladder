name: Ladder Engine

on:
  schedule:
    - cron: '0 */2 * * *' # Run every 2 hours
  workflow_dispatch: # Allow manual run

permissions:
  contents: write

concurrency:
  group: ladder-engine
  cancel-in-progress: false

jobs:
  engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Roster Sync
        continue-on-error: true
        timeout-minutes: 15
        env:
          WZ_EMAIL: ${{ secrets.WZ_EMAIL }}
          WZ_API_TOKEN: ${{ secrets.WZ_API_TOKEN }}
        run: node scripts/roster_sync.js

      - name: Run Referee
        env:
          WZ_EMAIL: ${{ secrets.WZ_EMAIL }}
          WZ_API_TOKEN: ${{ secrets.WZ_API_TOKEN }}
        run: node scripts/referee.js

      - name: Run Matchmaker
        env:
          WZ_EMAIL: ${{ secrets.WZ_EMAIL }}
          WZ_API_TOKEN: ${{ secrets.WZ_API_TOKEN }}
        run: node scripts/matchmaker.js

      - name: Commit State Changes
        run: |
          git config --global user.name "Norman (Bot)"
          git config --global user.email "norman-bot@users.noreply.github.com"
          git add data/
          git commit -m "Engine: Update state" || { echo "No changes to commit"; exit 0; }
          for i in 1 2 3; do
            git push && exit 0
            echo "push rejected - rebasing onto latest main (attempt $i)"
            git pull --rebase origin main
          done
          git push
