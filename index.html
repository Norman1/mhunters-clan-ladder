<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M'HUNTERS — Clan Ladder — Standings</title>
  <meta name="description" content="M'Hunters clan ladder — ranked 1v1 standings, reserve roster, and the Gazette.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Cinzel:wght@700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Fixed full-page watermark (archer banner, steel-tinted) -->
  <div class="watermark" aria-hidden="true"></div>

  <!-- ===================== MASTHEAD ===================== -->
  <header class="masthead">
    <div class="masthead__inner">
      <div class="brand">
        <img class="brand__crest" src="assets/clan-crest.png" alt="M'Hunters clan crest" width="44" height="44">
        <div class="brand__text">
          <span class="brand__wordmark">M'HUNTERS</span>
          <span class="brand__subtitle">1V1 CLAN LADDER</span>
        </div>
      </div>
      <div class="masthead__right">
        <div class="stats" role="status" aria-label="Ladder status">
          <span class="stat" id="stat-active">— ACTIVE</span>
          <span class="stat stat--games" id="stat-games">— GAMES</span>
          <span class="stat stat--updated" id="stat-updated">Last Update —</span>
        </div>
        <nav class="mainnav" aria-label="Primary">
          <a href="#" class="mainnav__link active" aria-current="page">STANDINGS</a>
          <a href="games.html" class="mainnav__link">GAMES</a>
          <a href="maps.html" class="mainnav__link">MAPS</a>
          <a href="actions.html" class="mainnav__link">ACTIONS</a>
          <a href="rules.html" class="mainnav__link">RULES</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="layout">

    <div class="col-main">

    <!-- ===================== STANDINGS ===================== -->
    <section class="standings panel">
      <div class="toolbar">
        <h1 class="page-title">STANDINGS <img class="clan-tag" src="assets/clan-tag.png" alt="" width="16" height="15"></h1>
        <input type="search" id="search-input" class="search" placeholder="FIND A PLAYER"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               aria-label="Find a player">
      </div>
      <div class="table-wrap">
        <table class="standings-table">
          <thead>
            <tr>
              <th class="c-delta" scope="col" aria-label="Rank change this week"></th>
              <th class="c-pos" scope="col" data-sort="pos" title="Sort by position">#</th>
              <th class="c-insignia" scope="col" data-sort="rank" title="Sort by rank (career wins)">RANK</th>
              <th class="c-player" scope="col" data-sort="player" title="Sort by name">PLAYER</th>
              <th class="c-rating" scope="col" data-sort="rating" title="Sort by rating">RATING</th>
              <th class="c-winrate" scope="col" data-sort="winrate" title="Sort by win rate">WIN%</th>
              <th class="c-streak" scope="col" data-sort="streak" title="Sort by streak">STREAK</th>
            </tr>
          </thead>
          <tbody id="standings-body">
            <!-- pre-data skeleton; app.js replaces the tbody contents -->
            <tr class="skeleton" aria-hidden="true">
              <td class="c-delta"><span class="sk" style="width:20px"></span></td>
              <td class="c-pos"><span class="sk" style="width:16px"></span></td>
              <td class="c-insignia"><span class="sk sk--disc"></span></td>
              <td class="c-player"><span class="sk" style="width:150px"></span></td>
              <td class="c-rating"><span class="sk" style="width:38px"></span></td>
              <td class="c-winrate"><span class="sk" style="width:30px"></span></td>
              <td class="c-streak"><span class="sk" style="width:40px"></span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ===================== RESERVE ===================== -->
    <section class="reserve">
      <button id="reserve-bar" type="button" aria-expanded="false" aria-controls="reserve-section">
        <span class="reserve-bar__label">INACTIVE PLAYERS — <span id="reserve-count">2 PAUSED · 59 INACTIVE</span></span>
        <span class="chevron" aria-hidden="true">▾</span>
      </button>
      <div id="reserve-section" hidden>
        <div class="table-wrap">
          <table class="standings-table standings-table--reserve">
            <thead>
              <tr>
                <th class="c-pos" scope="col">#</th>
                <th class="c-insignia" scope="col">RANK</th>
                <th class="c-player" scope="col">PLAYER</th>
                <th class="c-rating" scope="col">RATING</th>
                <th class="c-winrate" scope="col">WIN%</th>
                <th class="c-streak" scope="col">STREAK</th>
              </tr>
            </thead>
            <tbody id="reserve-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    </div>

    <!-- ===================== FEED (honors + results) ===================== -->
    <aside class="col-feed">
      <section class="feed panel">
        <div class="toolbar">
          <h2 class="page-title">FEED</h2>
        </div>
        <div id="feed-list"></div>
        <div class="gazette__footer">
          <a href="feed.html" class="gazette__more">FULL FEED →</a>
        </div>
      </section>
    </aside>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <p class="colophon">M'HUNTERS · WARZONE CLAN 141</p>
  </footer>

  <!-- ===================== MOBILE TAB BAR ===================== -->
  <nav class="tabbar" aria-label="Primary mobile">
    <a href="#" class="tab active" aria-current="page">
      <span class="tab__glyph" aria-hidden="true">▤</span>
      <span class="tab__label">STANDINGS</span>
    </a>
    <a href="games.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">⚔</span>
      <span class="tab__label">GAMES</span>
    </a>
    <a href="maps.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">◈</span>
      <span class="tab__label">MAPS</span>
    </a>
    <a href="actions.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">⚙</span>
      <span class="tab__label">ACTIONS</span>
    </a>
    <a href="rules.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">§</span>
      <span class="tab__label">RULES</span>
    </a>
  </nav>

  <script src="js/derive.js"></script>
  <script src="js/insignia.js"></script>
  <script src="js/feeditems.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
