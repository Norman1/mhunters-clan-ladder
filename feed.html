<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M'HUNTERS — Feed</title>
  <meta name="description" content="M'Hunters clan ladder — the full feed: every honor and every game result, newest first.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Cinzel:wght@700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Fixed full-page watermark (archer banner, steel-tinted) -->
  <div class="watermark" aria-hidden="true"></div>

  <!-- ===================== MASTHEAD ===================== -->
  <header class="masthead">
    <div class="masthead__inner">
      <a class="brand" href="index.html" aria-label="M'Hunters — back to standings">
        <img class="brand__crest" src="assets/clan-crest.png" alt="" width="44" height="44">
        <div class="brand__text">
          <span class="brand__wordmark">M'HUNTERS</span>
          <span class="brand__subtitle">1V1 CLAN LADDER</span>
        </div>
      </a>
      <div class="masthead__right">
        <div class="stats" role="status" aria-label="Ladder status">
          <span class="stat" id="stat-active">— ACTIVE</span>
          <span class="stat stat--games" id="stat-games">— GAMES</span>
          <span class="stat stat--updated" id="stat-updated">Last Activity —</span>
        </div>
        <nav class="mainnav" aria-label="Primary">
          <a href="index.html" class="mainnav__link">STANDINGS</a>
          <a href="games.html" class="mainnav__link">GAMES</a>
          <a href="templates.html" class="mainnav__link">TEMPLATES</a>
          <a href="actions.html" class="mainnav__link">ACTIONS</a>
          <a href="rules.html" class="mainnav__link">RULES</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="feed-layout">

    <a class="backlink" href="index.html">← STANDINGS</a>

    <!-- ===================== FULL FEED (honors + results) ===================== -->
    <section class="feed panel">
      <div class="toolbar">
        <h1 class="page-title">FEED</h1>
      </div>
      <div id="feed-list">
        <!-- pre-data skeleton; js/feed.js replaces the list contents -->
        <div class="feed-skel" aria-hidden="true"></div>
        <div class="feed-skel" aria-hidden="true"></div>
        <div class="feed-skel" aria-hidden="true"></div>
        <div class="feed-skel" aria-hidden="true"></div>
        <div class="feed-skel" aria-hidden="true"></div>
        <div class="feed-skel" aria-hidden="true"></div>
        <div class="feed-skel" aria-hidden="true"></div>
        <div class="feed-skel" aria-hidden="true"></div>
      </div>
      <!-- lazy-load sentinel: IntersectionObserver target (js/feed.js) -->
      <div id="feed-sentinel" aria-hidden="true"></div>
    </section>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <p class="colophon">M'HUNTERS · WARZONE CLAN 141</p>
  </footer>

  <!-- ===================== MOBILE TAB BAR ===================== -->
  <nav class="tabbar" aria-label="Primary mobile">
    <a href="index.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">▤</span>
      <span class="tab__label">STANDINGS</span>
    </a>
    <a href="games.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">⚔</span>
      <span class="tab__label">GAMES</span>
    </a>
    <a href="templates.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">◈</span>
      <span class="tab__label">TEMPLATES</span>
    </a>
    <a href="actions.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">⚙</span>
      <span class="tab__label">ACTIONS</span>
    </a>
    <a href="rules.html" class="tab">
      <span class="tab__glyph" aria-hidden="true">§</span>
      <span class="tab__label">RULES</span>
    </a>
  </nav>

  <script src="js/derive.js"></script>
  <script src="js/insignia.js"></script>
  <script src="js/feeditems.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
